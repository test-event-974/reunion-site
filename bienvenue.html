<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenue | La Réunion 2027</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --line: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 20px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      position: relative;
      min-height: 72vh;
      display: flex;
      align-items: end;
      background-size: cover;
      background-position: center;
      color: white;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.20)),
        linear-gradient(to right, rgba(0,0,0,0.32), rgba(0,0,0,0.08));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 64px 0 56px;
    }

    .kicker {
      display: inline-block;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.08;
      max-width: 820px;
    }

    .hero-subtitle {
      margin: 0;
      max-width: 760px;
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: rgba(255,255,255,0.92);
    }

    .section {
      padding: 56px 0;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.95fr;
      gap: 28px;
      align-items: start;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .intro-text p {
      margin: 0 0 18px;
      font-size: 1.08rem;
    }

    .intro-text p:last-child {
      margin-bottom: 0;
    }

    .side-panel h2,
    .closing h2,
    .gallery-block h2 {
      margin: 0 0 14px;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .highlights {
      display: grid;
      gap: 16px;
    }

    .highlight {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      background: #fcfcfc;
    }

    .highlight h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: var(--accent-dark);
    }

    .highlight p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .gallery-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .gallery-item {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .gallery-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #e5e7eb;
    }

    .gallery-caption {
      padding: 14px 16px 16px;
      font-size: 0.96rem;
      color: var(--muted);
    }

    .closing {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--line);
    }

    .closing p {
      margin: 0 0 16px;
      font-size: 1.05rem;
    }

    .signature {
      font-weight: 700;
      color: var(--accent-dark);
      margin-top: 18px;
      line-height: 1.8;
    }

    .loading,
    .error {
      padding: 56px 24px;
      text-align: center;
      font-size: 1.05rem;
    }

    .loading {
      color: var(--muted);
    }

    .error {
      color: #b91c1c;
      white-space: pre-line;
    }

    @media (max-width: 900px) {
      .intro-grid,
      .gallery-wrap {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 62vh;
      }

      .section {
        padding: 40px 0;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Chargement…</div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOY9WmGasf0YMnB1w3mpQYNIAF-C3b1j46K7JxckTOlapK4RdAZtofozukxHeSAl2IqwWzCxaxSqtg/pub?output=csv";

    function normalizeGoogleSheetUrl(url) {
      if (!url) return url;

      if (
        url.includes("/pub?gid=") ||
        url.includes("output=csv") ||
        url.includes("/export?format=csv")
      ) {
        return url;
      }

      const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (!match) return url;

      const sheetId = match[1];
      const gidMatch = url.match(/[?&]gid=([0-9]+)/);
      const gid = gidMatch ? gidMatch[1] : "0";

      return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
    }

    function parseCSV(csvText) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      if (rows.length === 0) return [];

      const headers = rows[0].map(h => (h || "").trim());
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = (r[idx] || "").trim();
        });
        return obj;
      });
    }

    function escapeHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toFieldMap(data, pageName) {
      return data
        .filter(item => item.page === pageName && item.field && item.field !== "field")
        .reduce((acc, item) => {
          acc[item.field] = item.value || "";
          return acc;
        }, {});
    }

    function getGalleryItems(f) {
      const items = [];
      for (let i = 1; i <= 6; i++) {
        const url = f[`image_${i}_url`];
        const caption = f[`image_${i}_caption`] || "";
        if (url) {
          items.push({ url, caption });
        }
      }
      return items;
    }

    function renderGallery(items) {
      if (!items.length) return "";

      return `
        <section class="section" style="padding-top:0;">
          <div class="container">
            <div class="gallery-block">
              <h2>Regards sur La Réunion</h2>
              <div class="gallery-wrap">
                ${items.map(item => `
                  <figure class="gallery-item">
                    <img class="gallery-image" src="${escapeHtml(item.url)}" alt="${escapeHtml(item.caption || "Photo de La Réunion")}" loading="lazy">
                    ${item.caption ? `<figcaption class="gallery-caption">${escapeHtml(item.caption)}</figcaption>` : ""}
                  </figure>
                `).join("")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderPage(f) {
      const heroImage = f.hero_image || "";
      const galleryItems = getGalleryItems(f);

      return `
        <section class="hero" style="background-image:url('${heroImage}')">
          <div class="container hero-content">
            <div class="kicker">${escapeHtml(f.hero_kicker || "")}</div>
            <h1>${escapeHtml(f.hero_title || "Bienvenue")}</h1>
            <p class="hero-subtitle">${escapeHtml(f.hero_subtitle || "")}</p>
          </div>
        </section>

        <section class="section">
          <div class="container intro-grid">
            <div class="card intro-text">
              <p>${escapeHtml(f.intro_1 || "")}</p>
              <p>${escapeHtml(f.intro_2 || "")}</p>
              <p>${escapeHtml(f.intro_3 || "")}</p>
              <p>${escapeHtml(f.intro_4 || "")}</p>
            </div>

            <div class="highlights">
              <div class="card side-panel">
                <h2>Découvrir La Réunion</h2>
                <div class="highlight">
                  <h3>${escapeHtml(f.card_1_title || "")}</h3>
                  <p>${escapeHtml(f.card_1_text || "")}</p>
                </div>
                <div class="highlight" style="margin-top:12px;">
                  <h3>${escapeHtml(f.card_2_title || "")}</h3>
                  <p>${escapeHtml(f.card_2_text || "")}</p>
                </div>
                <div class="highlight" style="margin-top:12px;">
                  <h3>${escapeHtml(f.card_3_title || "")}</h3>
                  <p>${escapeHtml(f.card_3_text || "")}</p>
                </div>
              </div>
            </div>
          </div>
        </section>

        ${renderGallery(galleryItems)}

        <section class="section" style="padding-top:0;">
          <div class="container">
            <div class="card closing">
              <h2>${escapeHtml(f.closing_title || "")}</h2>
              <p>${escapeHtml(f.closing_text || "")}</p>
              <div class="signature">
                ${escapeHtml(f.signature || "")}<br>
                ${escapeHtml(f.signature_2 || "")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    async function loadPage() {
      const app = document.getElementById("app");
      const finalUrl = normalizeGoogleSheetUrl(SHEET_CSV_URL);

      try {
        const response = await fetch(finalUrl);
        if (!response.ok) {
          throw new Error(`Impossible de charger la Google Sheet.\nHTTP ${response.status}\nURL : ${finalUrl}`);
        }

        const csvText = await response.text();
        const data = parseCSV(csvText);
        const fields = toFieldMap(data, "bienvenue");

        if (!Object.keys(fields).length) {
          throw new Error("Aucune donnée trouvée pour la page 'bienvenue'.");
        }

        app.innerHTML = renderPage(fields);
      } catch (error) {
        app.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      }
    }

    loadPage();
  </script>
</body>
</html>
