<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenue | La Réunion 2027</title>

  <!-- POLICE JW STYLE -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --page-bg: #dcdcdc;
      --site-bg: #f5f5f5;
      --white: #ffffff;
      --text: #333333;
      --muted: #666666;
      --brown-dark: #3b322f;
      --brown: #5a2d1f;
      --brown-soft: #8a4b34;
      --line: #d7d7d7;
      --tab-line: #b45c3c;
      --hero-caption-bg: rgba(245, 245, 245, 0.92);
      --maxw: 1430px;
      --logo-green: #6f9d31;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
      background: var(--page-bg);
      color: var(--text);
    }

    a { text-decoration: none; color: inherit; }

    .page-shell {
      max-width: var(--maxw);
      margin: 0 auto;
      background: var(--site-bg);
    }

    /* HEADER */
    .topbar {
      display: flex;
      background: #fff;
      border-top: 4px solid #28313d;
    }

    .jw-box {
      width: 100px;
      background: var(--logo-green);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .jw { font-size: 36px; }
    .event { font-size: 16px; font-weight: 700; }

    .brand-text {
      padding: 12px 18px;
      font-size: 24px;
      display: flex;
      align-items: center;
      color: #4a4a4a;
    }

    .location-box {
      flex: 1;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
    }

    .country {
      font-size: 26px;
      font-weight: 700;
      color: var(--brown);
      text-transform: uppercase;
    }

    .city {
      font-size: 20px;
      color: var(--brown);
    }

    /* NAV */
    .nav-main {
      background: var(--brown-dark);
      color: #fff;
      display: flex;
      gap: 30px;
      padding: 12px 20px;
      font-size: 15px;
      text-transform: uppercase;
    }

    .nav-tabs {
      background: #fff;
      display: flex;
      gap: 30px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .nav-tabs a {
      padding: 16px 0;
      font-size: 15px;
      color: var(--brown-soft);
      border-bottom: 3px solid transparent;
      font-weight: 600;
    }

    .nav-tabs a.active {
      color: var(--brown);
      border-bottom: 3px solid var(--tab-line);
    }

    /* HERO */
    .hero {
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }

    .hero-caption {
      position: absolute;
      bottom: -25px;
      left: 8%;
      right: 8%;
      background: var(--hero-caption-bg);
      padding: 14px 20px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* CONTENT */
    .article {
      padding: 80px 8% 40px;
    }

    h1 {
      font-size: 36px;
      color: var(--brown);
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    p {
      font-size: 17px;
      line-height: 1.6;
      margin-bottom: 18px;
      color: #3f3f3f;
      font-weight: 400;
    }

    .signature {
      margin-top: 25px;
      font-size: 17px;
      line-height: 1.6;
    }

    .signature strong {
      color: var(--brown);
      font-weight: 600;
    }

    .loading, .error {
      padding: 60px;
      text-align: center;
    }

    .error { color: red; }
  </style>
</head>

<body>
  <div id="app" class="page-shell">
    <div class="loading">Chargement…</div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOY9WmGasf0YMnB1w3mpQYNIAF-C3b1j46K7JxckTOlapK4RdAZtofozukxHeSAl2IqwWzCxaxSqtg/pub?gid=0&single=true&output=csv";

    function parseCSV(text) {
      const rows = text.split("\n").map(r => r.split(","));
      const headers = rows[0];
      return rows.slice(1).map(r => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = r[i]);
        return obj;
      });
    }

    function toMap(data) {
      let map = {};
      data.forEach(d => {
        if (d.page === "bienvenue") map[d.field] = d.value;
      });
      return map;
    }

    function render(f) {
      return `
      <header>
        <div class="topbar">
          <div class="jw-box">
            <div class="jw">JW</div>
            <div class="event">EVENT</div>
          </div>
          <div class="brand-text">Jehovah’s Witnesses Conventions</div>
          <div class="location-box">
            <div>
              <div class="country">LA RÉUNION</div>
              <div class="city">SAINT-DENIS</div>
            </div>
            <div>Français</div>
          </div>
        </div>

        <div class="nav-main">
          <div>Accueil</div>
          <div>Lieux</div>
          <div>Assemblée</div>
        </div>

        <div class="nav-tabs">
          <a class="active">Bienvenue</a>
          <a href="oeuvre.html">L’œuvre du Royaume</a>
          <a href="histoire.html">Notre histoire</a>
          <a href="pays.html">Le pays et ses habitants</a>
        </div>
      </header>

      <div class="hero">
        <img src="${f.hero_image}" />
        <div class="hero-caption">${f.hero_caption || f.hero_subtitle}</div>
      </div>

      <section class="article">
        <h1>${f.hero_title}</h1>
        <p>${f.intro_1}</p>
        <p>${f.intro_2}</p>
        <p>${f.intro_3}</p>
        <p>${f.intro_4}</p>
        <p>${f.closing_text}</p>

        <div class="signature">
          <strong>${f.signature}</strong><br>
          ${f.signature_2}
        </div>
      </section>
      `;
    }

    fetch(SHEET_CSV_URL)
      .then(r => r.text())
      .then(t => {
        const data = parseCSV(t);
        const f = toMap(data);
        document.getElementById("app").innerHTML = render(f);
      })
      .catch(() => {
        document.getElementById("app").innerHTML = "<div class='error'>Erreur chargement</div>";
      });
  </script>
</body>
</html>
