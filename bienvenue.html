<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenue | La Réunion 2027</title>
  <style>
    :root {
      --page-bg: #dcdcdc;
      --site-bg: #f5f5f5;
      --white: #ffffff;
      --text: #333333;
      --muted: #666666;
      --brown-dark: #3b322f;
      --brown: #5a2d1f;
      --brown-soft: #8a4b34;
      --line: #d7d7d7;
      --tab-line: #b45c3c;
      --hero-caption-bg: rgba(245, 245, 245, 0.92);
      --maxw: 1430px;
      --logo-green: #6f9d31;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      max-width: var(--maxw);
      margin: 0 auto;
      background: var(--site-bg);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: stretch;
      background: var(--white);
      border-top: 4px solid #28313d;
    }

    .brand-left {
      display: flex;
      align-items: stretch;
      min-width: 380px;
    }

    .jw-box {
      width: 102px;
      background: var(--logo-green);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .jw-box .jw {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .jw-box .event {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .brand-text {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      font-size: 25px;
      line-height: 1.05;
      color: #4a4a4a;
    }

    .location-box {
      flex: 1;
      padding: 10px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .location-title {
      line-height: 1.05;
    }

    .location-title .country {
      font-size: 27px;
      font-weight: 700;
      color: #5a1f12;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .location-title .city {
      font-size: 22px;
      color: #5a1f12;
      text-transform: uppercase;
    }

    .lang-box {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--brown-soft);
      font-size: 18px;
      white-space: nowrap;
    }

    .lang-icon,
    .help-icon {
      font-size: 18px;
      opacity: 0.9;
    }

    .nav-main {
      background: var(--brown-dark);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 34px;
      padding: 14px 26px;
      font-size: 17px;
      text-transform: uppercase;
      overflow-x: auto;
      white-space: nowrap;
    }

    .nav-tabs {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 34px;
      padding: 0 12px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .nav-tabs a {
      display: inline-block;
      padding: 18px 0 14px;
      font-size: 17px;
      text-transform: uppercase;
      color: var(--brown-soft);
      border-bottom: 3px solid transparent;
    }

    .nav-tabs a.active {
      color: var(--brown);
      font-weight: 700;
      border-bottom-color: var(--tab-line);
    }

    .content-wrap {
      padding: 0 12px 48px;
    }

    .hero {
      position: relative;
      background: #ddd;
    }

    .hero-image {
      width: 100%;
      height: 510px;
      object-fit: cover;
      display: block;
    }

    .hero-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 112px;
      background: rgba(72, 43, 22, 0.72);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      user-select: none;
    }

    .hero-arrow.left { left: 0; }
    .hero-arrow.right { right: 0; }

    .hero-caption {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -30px;
      background: var(--hero-caption-bg);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 24px;
      border: 1px solid #e2e2e2;
    }

    .hero-caption-badge {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: radial-gradient(circle at 70% 30%, #ffbb45, #e9681a 62%, #8b2f1e 100%);
      flex: 0 0 auto;
      position: relative;
    }

    .hero-caption-badge::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45);
    }

    .hero-caption-text {
      font-size: 18px;
      color: #4f4f4f;
    }

    .article {
      background: var(--site-bg);
      padding: 86px 8% 0;
    }

    .article-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) 240px;
      gap: 34px;
      align-items: start;
    }

    .article h1 {
      margin: 0 0 24px;
      font-size: 37px;
      line-height: 1.1;
      color: var(--brown);
      font-weight: 700;
    }

    .article p {
      margin: 0 0 20px;
      font-size: 18px;
      line-height: 1.6;
      color: #3f3f3f;
    }

    .article-side {
      display: flex;
      justify-content: center;
      padding-top: 4px;
    }

    .article-emblem {
      width: 190px;
      height: 190px;
      position: relative;
    }

    .article-emblem::before,
    .article-emblem::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .article-emblem::before {
      width: 150px;
      height: 150px;
      right: 6px;
      bottom: 6px;
      background: radial-gradient(circle at 30% 30%, #ffcf5f, #f18a1f 62%, #bf4d1b 100%);
    }

    .article-emblem::after {
      width: 108px;
      height: 108px;
      left: 8px;
      top: 18px;
      background:
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0) 60%),
        linear-gradient(140deg, #7a1f16, #963015);
      clip-path: polygon(50% 0%, 61% 13%, 78% 10%, 73% 27%, 88% 37%, 71% 44%, 75% 62%, 58% 57%, 50% 74%, 42% 57%, 25% 62%, 29% 44%, 12% 37%, 27% 27%, 22% 10%, 39% 13%);
      border-radius: 0;
    }

    .signature {
      margin-top: 30px;
      font-size: 18px;
      line-height: 1.7;
      color: #444;
    }

    .signature strong {
      color: var(--brown);
    }

    .loading,
    .error {
      padding: 60px 20px;
      text-align: center;
      font-size: 18px;
    }

    .loading { color: #666; }
    .error {
      color: #a12727;
      white-space: pre-line;
    }

    @media (max-width: 1100px) {
      .brand-left { min-width: auto; }
      .brand-text { font-size: 21px; }
      .location-title .country { font-size: 23px; }
      .location-title .city { font-size: 19px; }
      .hero-image { height: 430px; }
      .article-grid { grid-template-columns: 1fr; }
      .article-side { justify-content: flex-start; }
    }

    @media (max-width: 760px) {
      .topbar { flex-direction: column; }
      .brand-left { min-width: 100%; }
      .location-box {
        padding: 14px 16px;
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-main {
        gap: 18px;
        padding: 12px 16px;
        font-size: 15px;
      }
      .nav-tabs {
        gap: 22px;
        padding: 0 16px;
      }
      .nav-tabs a { font-size: 15px; }
      .content-wrap { padding: 0 0 36px; }
      .hero-image { height: 300px; }
      .hero-arrow {
        width: 42px;
        height: 82px;
        font-size: 42px;
      }
      .hero-caption {
        left: 12px;
        right: 12px;
        bottom: -22px;
        padding: 10px 14px;
      }
      .hero-caption-badge {
        width: 46px;
        height: 46px;
      }
      .hero-caption-text { font-size: 15px; }
      .article { padding: 58px 20px 0; }
      .article h1 { font-size: 29px; }
      .article p,
      .signature { font-size: 17px; }
      .article-emblem {
        width: 130px;
        height: 130px;
      }
      .article-emblem::before {
        width: 105px;
        height: 105px;
      }
      .article-emblem::after {
        width: 75px;
        height: 75px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell" id="app">
    <div class="loading">Chargement…</div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOY9WmGasf0YMnB1w3mpQYNIAF-C3b1j46K7JxckTOlapK4RdAZtofozukxHeSAl2IqwWzCxaxSqtg/pub?gid=0&single=true&output=csv";

    function parseCSV(csvText) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(h => (h || "").trim());
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = (r[idx] || "").trim();
        });
        return obj;
      });
    }

    function escapeHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toFieldMap(data, pageName) {
      return data
        .filter(item => item.page === pageName && item.field && item.field !== "field")
        .reduce((acc, item) => {
          acc[item.field] = item.value || "";
          return acc;
        }, {});
    }

    function renderPage(f) {
      const heroImage = f.hero_image || "";
      const heroCaption = f.hero_caption || "";
      const heroTitle = f.hero_title || "Bienvenue";
      const heroSubtitle = f.hero_subtitle || "";
      const intro1 = f.intro_1 || "";
      const intro2 = f.intro_2 || "";
      const intro3 = f.intro_3 || "";
      const intro4 = f.intro_4 || "";
      const closingText = f.closing_text || "";
      const signature = f.signature || "";
      const signature2 = f.signature_2 || "";

      return `
        <header>
          <div class="topbar">
            <div class="brand-left">
              <div class="jw-box">
                <div class="jw">JW</div>
                <div class="event">EVENT</div>
              </div>
              <div class="brand-text">Jehovah’s Witnesses<br>Conventions</div>
            </div>

            <div class="location-box">
              <div class="location-title">
                <div class="country">LA RÉUNION</div>
                <div class="city">SAINT-DENIS</div>
              </div>

              <div class="lang-box">
                <span class="lang-icon">🈯</span>
                <span>Français</span>
                <span class="help-icon">?</span>
              </div>
            </div>
          </div>

          <nav class="nav-main">
            <a href="#">⌂ Accueil</a>
            <a href="#">◌ Lieux</a>
            <a href="#">◍ Assemblée</a>
          </nav>

          <nav class="nav-tabs">
            <a href="bienvenue.html" class="active">Bienvenue</a>
            <a href="oeuvre.html">L’œuvre du Royaume</a>
            <a href="histoire.html">Notre histoire</a>
            <a href="pays.html">Le pays et ses habitants</a>
            <a href="#">Es-tu intéressé(e)&nbsp;?</a>
          </nav>
        </header>

        <main class="content-wrap">
          <section class="hero">
            <img class="hero-image" src="${escapeHtml(heroImage)}" alt="${escapeHtml(heroTitle)}">
            <div class="hero-arrow left">‹</div>
            <div class="hero-arrow right">›</div>

            <div class="hero-caption">
              <div class="hero-caption-badge"></div>
              <div class="hero-caption-text">${escapeHtml(heroCaption || heroSubtitle)}</div>
            </div>
          </section>

          <section class="article">
            <div class="article-grid">
              <div class="article-main">
                <h1>${escapeHtml(heroTitle)}</h1>
                <p>${escapeHtml(intro1)}</p>
                <p>${escapeHtml(intro2)}</p>
                <p>${escapeHtml(intro3)}</p>
                <p>${escapeHtml(intro4)}</p>
                <p>${escapeHtml(closingText)}</p>

                <div class="signature">
                  <strong>${escapeHtml(signature)}</strong><br>
                  ${escapeHtml(signature2)}
                </div>
              </div>

              <aside class="article-side">
                <div class="article-emblem" aria-hidden="true"></div>
              </aside>
            </div>
          </section>
        </main>
      `;
    }

    async function loadPage() {
      const app = document.getElementById("app");

      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) {
          throw new Error(`Impossible de charger la Google Sheet.\nHTTP ${response.status}`);
        }

        const csvText = await response.text();
        const data = parseCSV(csvText);
        const fields = toFieldMap(data, "bienvenue");

        if (!Object.keys(fields).length) {
          throw new Error("Aucune donnée trouvée pour la page 'bienvenue'.");
        }

        app.innerHTML = renderPage(fields);
      } catch (error) {
        app.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      }
    }

    loadPage();
  </script>
</body>
</html>
