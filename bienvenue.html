<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenue | La Réunion 2027</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --page-bg: #dcdcdc;
      --site-bg: #f5f5f5;
      --white: #ffffff;
      --text: #333333;
      --brown-dark: #3b322f;
      --brown: #5a2d1f;
      --brown-soft: #8a4b34;
      --line: #d7d7d7;
      --tab-line: #b45c3c;
      --hero-caption-bg: rgba(245, 245, 245, 0.94);
      --maxw: 1430px;
      --logo-green: #6f9d31;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
      background: var(--page-bg);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page-shell {
      max-width: var(--maxw);
      margin: 0 auto;
      background: var(--site-bg);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: stretch;
      background: #fff;
      border-top: 4px solid #28313d;
    }

    .brand-block {
      display: flex;
      min-width: 0;
      flex: 1 1 auto;
    }

    .jw-box {
      width: 100px;
      min-width: 100px;
      background: var(--logo-green);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
    }

    .jw {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .event {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-text {
      padding: 12px 18px;
      font-size: 24px;
      line-height: 1.08;
      display: flex;
      align-items: center;
      color: #4a4a4a;
      min-width: 0;
    }

    .location-box {
      flex: 1 1 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      min-width: 0;
    }

    .country {
      font-size: 26px;
      font-weight: 700;
      color: var(--brown);
      text-transform: uppercase;
      line-height: 1.05;
    }

    .city {
      font-size: 20px;
      color: var(--brown);
      text-transform: uppercase;
      line-height: 1.05;
    }

    .lang-box {
      font-size: 16px;
      color: var(--brown-soft);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-main {
      background: var(--brown-dark);
      color: #fff;
      display: flex;
      gap: 30px;
      padding: 12px 20px;
      font-size: 15px;
      text-transform: uppercase;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }

    .nav-main::-webkit-scrollbar,
    .nav-tabs::-webkit-scrollbar {
      height: 6px;
    }

    .nav-main::-webkit-scrollbar-thumb,
    .nav-tabs::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
    }

    .nav-tabs {
      background: #fff;
      display: flex;
      gap: 30px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }

    .nav-tabs a {
      padding: 16px 0 14px;
      font-size: 15px;
      color: var(--brown-soft);
      border-bottom: 3px solid transparent;
      font-weight: 600;
      flex: 0 0 auto;
    }

    .nav-tabs a.active {
      color: var(--brown);
      border-bottom-color: var(--tab-line);
    }

    .hero {
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      display: block;
    }

    .hero-caption {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -25px;
      background: var(--hero-caption-bg);
      padding: 14px 18px;
      font-size: 16px;
      color: #4c4c4c;
      box-shadow: 0 1px 0 rgba(0,0,0,0.05);
    }

    .article {
      padding: 72px 8% 40px;
    }

    h1 {
      font-size: 36px;
      color: var(--brown);
      margin: 0 0 20px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.12;
    }

    p {
      font-size: 17px;
      line-height: 1.68;
      margin: 0 0 18px;
      color: #3f3f3f;
      font-weight: 400;
    }

    .signature {
      margin-top: 25px;
      font-size: 17px;
      line-height: 1.7;
    }

    .signature strong {
      color: var(--brown);
      font-weight: 600;
    }

    .loading,
    .error {
      padding: 60px 20px;
      text-align: center;
      font-size: 18px;
    }

    .error {
      color: #a12727;
      white-space: pre-line;
    }

    @media (max-width: 1024px) {
      .brand-text {
        font-size: 21px;
      }

      .country {
        font-size: 23px;
      }

      .city {
        font-size: 18px;
      }

      .hero img {
        height: 420px;
      }

      .article {
        padding-top: 66px;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
      }

      .brand-block {
        width: 100%;
      }

      .jw-box {
        width: 88px;
        min-width: 88px;
      }

      .jw {
        font-size: 32px;
      }

      .event {
        font-size: 14px;
      }

      .brand-text {
        padding: 12px 14px;
        font-size: 19px;
      }

      .location-box {
        padding: 12px 14px 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .country {
        font-size: 20px;
      }

      .city {
        font-size: 16px;
      }

      .lang-box {
        font-size: 15px;
      }

      .nav-main {
        gap: 20px;
        padding: 11px 14px;
        font-size: 14px;
      }

      .nav-tabs {
        gap: 22px;
        padding: 0 14px;
      }

      .nav-tabs a {
        font-size: 14px;
        padding: 14px 0 12px;
      }

      .hero img {
        height: 260px;
      }

      .hero-caption {
        left: 12px;
        right: 12px;
        bottom: -18px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .article {
        padding: 48px 16px 28px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 16px;
      }

      p {
        font-size: 16px;
        line-height: 1.62;
        margin-bottom: 16px;
      }

      .signature {
        margin-top: 20px;
        font-size: 16px;
      }
    }

    @media (max-width: 420px) {
      .brand-text {
        font-size: 17px;
      }

      .hero img {
        height: 220px;
      }

      h1 {
        font-size: 25px;
      }

      p,
      .signature {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div id="app" class="page-shell">
    <div class="loading">Chargement…</div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOY9WmGasf0YMnB1w3mpQYNIAF-C3b1j46K7JxckTOlapK4RdAZtofozukxHeSAl2IqwWzCxaxSqtg/pub?gid=0&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(h => (h || "").trim());

      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (r[i] || "").trim();
        });
        return obj;
      });
    }

    function escapeHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toMap(data) {
      const map = {};
      data.forEach(d => {
        if (d.page === "bienvenue" && d.field && d.field !== "field") {
          map[d.field] = d.value || "";
        }
      });
      return map;
    }

    function render(f) {
      const heroImage = escapeHtml(f.hero_image || "");
      const heroCaption = escapeHtml(f.hero_caption || f.hero_subtitle || "");
      const heroTitle = escapeHtml(f.hero_title || "Bienvenue");
      const intro1 = escapeHtml(f.intro_1 || "");
      const intro2 = escapeHtml(f.intro_2 || "");
      const intro3 = escapeHtml(f.intro_3 || "");
      const intro4 = escapeHtml(f.intro_4 || "");
      const closingText = escapeHtml(f.closing_text || "");
      const signature = escapeHtml(f.signature || "");
      const signature2 = escapeHtml(f.signature_2 || "");

      return `
        <header>
          <div class="topbar">
            <div class="brand-block">
              <div class="jw-box">
                <div class="jw">JW</div>
                <div class="event">EVENT</div>
              </div>
              <div class="brand-text">Jehovah’s Witnesses<br>Conventions</div>
            </div>

            <div class="location-box">
              <div>
                <div class="country">LA RÉUNION</div>
                <div class="city">SAINT-DENIS</div>
              </div>
              <div class="lang-box">Français</div>
            </div>
          </div>

          <nav class="nav-main">
            <div>Accueil</div>
            <div>Lieux</div>
            <div>Assemblée</div>
          </nav>

          <div class="nav-tabs">
            <a href="bienvenue.html" class="active">Bienvenue</a>
            <a href="oeuvre.html">L’œuvre du Royaume</a>
            <a href="histoire.html">Notre histoire</a>
            <a href="pays.html">Le pays et ses habitants</a>
          </div>
        </header>

        <div class="hero">
          <img src="${heroImage}" alt="${heroTitle}">
          <div class="hero-caption">${heroCaption}</div>
        </div>

        <section class="article">
          <h1>${heroTitle}</h1>
          <p>${intro1}</p>
          <p>${intro2}</p>
          <p>${intro3}</p>
          <p>${intro4}</p>
          <p>${closingText}</p>

          <div class="signature">
            <strong>${signature}</strong><br>
            ${signature2}
          </div>
        </section>
      `;
    }

    fetch(SHEET_CSV_URL)
      .then(response => {
        if (!response.ok) {
          throw new Error("Impossible de charger la Google Sheet.");
        }
        return response.text();
      })
      .then(text => {
        const data = parseCSV(text);
        const f = toMap(data);

        if (!Object.keys(f).length) {
          throw new Error("Aucune donnée trouvée pour la page bienvenue.");
        }

        document.getElementById("app").innerHTML = render(f);
      })
      .catch(error => {
        document.getElementById("app").innerHTML =
          "<div class='error'>" + escapeHtml(error.message) + "</div>";
      });
  </script>
</body>
</html>
