  <h4 id="hero_kicker"></h4>
  <h1 id="hero_title"></h1>

<script src="script.js"></script>
<script>
(async () => {
  const data = await loadData();
  const page = getPageData(data, "bienvenue");

  document.getElementById("hero_kicker").innerText = page.hero_kicker || "";
  document.getElementById("hero_title").innerText = page.hero_title || "";

  if (page.hero_image) {
    document.getElementById("hero").style.backgroundImage = `url(${page.hero_image})`;
  }
})();
</script>
