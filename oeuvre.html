<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>L’œuvre du Royaume</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="bienvenue.html">Bienvenue</a>
  <a href="oeuvre.html">L’œuvre du Royaume</a>
  <a href="histoire.html">Notre histoire</a>
  <a href="pays.html">Le pays et ses habitants</a>
  <a href="interesse.html">Es-tu intéressé(e) ?</a>
</nav>

<section class="hero">
  <h4 id="hero_kicker"></h4>
  <h1 id="hero_title"></h1>
  <p id="hero_subtitle"></p>
  <img id="hero_image" />
</section>

<section id="gallery">
  <h2 id="gallery_title"></h2>
  <div id="gallery_grid"></div>
</section>

<!-- SCRIPT ICI (important : en bas du body) -->
<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOY9WmGasf0YMnB1w3mpQYNIAF-C3b1j46K7JxckTOlapK4RdAZtofozukxHeSAl2IqwWzCxaxSqtg/pub?output=tsv";
  const PAGE_KEY = "oeuvre";

  function parseTSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split("\t");
      if (cols.length >= 3) {
        rows.push({
          page: cols[0].trim(),
          field: cols[1].trim(),
          value: cols.slice(2).join("\t").trim()
        });
      }
    }
    return rows;
  }

  function mapPageData(rows, pageKey) {
    const data = {};
    rows.filter(r => r.page === pageKey).forEach(r => {
      data[r.field] = r.value;
    });
    return data;
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value || "";
  }

  function setImage(id, url) {
    const img = document.getElementById(id);
    if (img && url) img.src = url;
  }

  function renderGallery(data) {
    const grid = document.getElementById("gallery_grid");
    if (!grid) return;

    const items = [];
    for (let i = 1; i <= 6; i++) {
      const url = data[`image_${i}_url`];
      const caption = data[`image_${i}_caption`];
      if (url) items.push({ url, caption });
    }

    grid.innerHTML = items.map(item => `
      <figure>
        <img src="${item.url}">
        <figcaption>${item.caption || ""}</figcaption>
      </figure>
    `).join("");
  }

  async function loadPage() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = parseTSV(text);
    const data = mapPageData(rows, PAGE_KEY);

    setText("hero_kicker", data.hero_kicker);
    setText("hero_title", data.hero_title);
    setText("hero_subtitle", data.hero_subtitle);
    setImage("hero_image", data.hero_image);

    setText("gallery_title", data.gallery_title);

    renderGallery(data);
  }

  loadPage();
</script>

</body>
</html>
